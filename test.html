<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAuth2 Backend Test</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f9fafb;
        margin: 0;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }
      .btn {
        display: inline-block;
        background: #4285f4;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
        margin-top: 20px;
      }
      .btn:hover {
        background: #357ae8;
      }
      .token-box {
        background: #f3f4f6;
        padding: 10px;
        border-radius: 4px;
        word-break: break-all;
        font-family: monospace;
        font-size: 12px;
        margin-top: 15px;
        border: 1px solid #e5e7eb;
      }
      .hidden {
        display: none;
      }
      .success {
        color: #10b981;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card" id="app">
      <div id="login-view">
        <h2>Test Auth Flow</h2>
        <p style="color: #6b7280; font-size: 14px">
          Clicking this will hit your Vercel backend at port 3000.
        </p>
        <a href="http://localhost:3000/auth/google/login" class="btn"
          >Sign in with Google</a
        >
      </div>

      <div id="success-view" class="hidden">
        <h2 class="success">Authentication Successful!</h2>
        <p>Your backend successfully created the JWT:</p>
        <div class="token-box" id="token-display"></div>
        <p style="font-size: 12px; color: #6b7280; margin-top: 15px">
          (Check your browser cookies to see the refresh token!)
        </p>
        <button
          class="btn"
          onclick="window.location.href = '/'"
          style="background: #374151"
        >
          Test Again
        </button>
      </div>
    </div>

    <script>
      // When the page loads, check if there is a hash in the URL
      window.onload = () => {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get("access_token");

        if (accessToken) {
          // We got the token!
          // 1. Hide the login view, show the success view
          document.getElementById("login-view").classList.add("hidden");
          document.getElementById("success-view").classList.remove("hidden");

          // 2. Display the token on screen
          document.getElementById("token-display").innerText = accessToken;

          // 3. Clean up the URL bar so the token isn't sitting there
          window.history.replaceState(null, "", "/");

          console.log("Access Token retrieved successfully:", accessToken);
        }
      };
    </script>
  </body>
</html>
